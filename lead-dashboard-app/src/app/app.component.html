<h1>Leads</h1>
<p-table [value]="leads" stripedRows>
  <ng-template #header>
    <tr>
        <th>View</th>
        <th>Email</th>
        <th>Phone Number</th>
        <th>Name</th>
        <th>Subject</th>
        <th>Message</th>
    </tr>
</ng-template>
<ng-template #body let-lead>
  <tr>
      <td><p-button label="view" icon="pi pi-eye" (onClick)="showLeadDetailDialog(lead)"></p-button></td>
      <td>{{ lead.contact.email }}</td>
      <td>{{ lead.contact.phoneNumber }}</td>
      <td>{{ lead.contact.lastName + ', ' + lead.contact.firstName }}</td>
      <td>{{ lead.subject }}</td>
      <td>{{ lead.message }}</td>
  </tr>
</ng-template>
</p-table>

<p-dialog
  header="Lead Detail"
  [modal]="true"
  [(visible)]="showLeadDetail"
  position="top"
  [style]="{ width: '50%', height: '50%' }">
  <app-lead-detail [lead]="lead"></app-lead-detail>
</p-dialog>
